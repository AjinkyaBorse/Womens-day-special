<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Women's Day | Celebrate Her</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #ec008c;
            --secondary: #fc6767;
            --gold: #D4AF37;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            overflow-x: hidden;
        }

        h1, h2, h3, .serif {
            font-family: 'Playfair Display', serif;
        }

        /* --- BACKGROUND ANIMATION --- */
        .bg-gradient {
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .blob {
            position: absolute;
            filter: blur(80px);
            opacity: 0.6;
            animation: float 3s infinite ease-in-out; /* Changed from 10s to 3s */
            z-index: -1;
        }
        .blob-1 { top: -10%; left: -10%; width: 500px; height: 500px; background: #e2f0cb; animation-delay: 0s; }
        .blob-2 { bottom: -10%; right: -10%; width: 600px; height: 600px; background: #ffcad4; animation-delay: 2s; }
        .blob-3 { top: 40%; left: 40%; width: 400px; height: 400px; background: #b5ead7; animation-delay: 4s; }

        @keyframes float {
            0% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(30px, -30px) rotate(10deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }

        /* --- RECIPIENT CARDS --- */
        .recipient-card {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .recipient-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 20px 40px rgba(236, 0, 140, 0.15);
        }

        .recipient-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: 0.5s;
        }

        .recipient-card:hover::before {
            left: 100%;
        }

        /* --- 3D GIFT BOX --- */
        .scene {
            perspective: 1000px;
            width: 300px;
            height: 300px;
            margin: 0 auto;
            position: relative;
        }

       /* --- 3D GIFT BOX --- */
.scene {
    perspective: 1000px;
    width: 200px;  /* Changed from 300px */
    height: 200px; /* Changed from 300px */
    margin: 0 auto;
    position: relative;
}

.gift-box {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 1s ease-in-out;
}

.gift-box.shake {
    animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
}

.gift-box.open {
    transform: rotateX(10deg) rotateY(10deg);
}

.face {
    position: absolute;
    width: 200px;  /* Changed from 300px */
    height: 200px; /* Changed from 300px */
    background: #ec008c;
    border: 2px solid #fff;
    box-shadow: inset 0 0 20px rgba(0,0,0,0.1);
}

.face.front  { transform: translateZ(100px); }  /* Changed from 150px (half of 200px) */
.face.back   { transform: rotateY(180deg) translateZ(100px); }
.face.right  { transform: rotateY(90deg) translateZ(100px); }
.face.left   { transform: rotateY(-90deg) translateZ(100px); }
.face.top    { transform: rotateX(90deg) translateZ(100px); background: #fc6767; }
.face.bottom { transform: rotateX(-90deg) translateZ(100px); }

.ribbon-vertical {
    position: absolute;
    width: 30px;  /* Changed from 40px */
    height: 100%;
    background: #D4AF37;
    left: 50%;
    transform: translateX(-50%);
}

.ribbon-horizontal {
    position: absolute;
    height: 30px;  /* Changed from 40px */
    width: 100%;
    background: #D4AF37;
    top: 50%;
    transform: translateY(-50%);
}

.bow {
    position: absolute;
    top: -30px;  /* Changed from -40px */
    left: 50%;
    transform: translateX(-50%);
    width: 80px;  /* Changed from 100px */
    height: 50px; /* Changed from 60px */
    background: #ec008c;
    border-radius: 50%;
    z-index: 10;
}

.bow::before, .bow::after {
    content: '';
    position: absolute;
    top: 0;
    width: 50px;  /* Changed from 60px */
    height: 50px; /* Changed from 60px */
    border-radius: 50%;
    border: 4px solid #D4AF37; /* Changed from 5px */
}

.bow::before { left: -40px; transform: rotate(-20deg); }
.bow::after { right: -40px; transform: rotate(20deg); }

        .ribbon-horizontal {
            position: absolute;
            height: 40px;
            width: 100%;
            background: #D4AF37;
            top: 50%;
            transform: translateY(-50%);
        }

        .bow {
            position: absolute;
            top: -40px;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 60px;
            background: #ec008c;
            border-radius: 50%;
            z-index: 10;
        }

        .bow::before, .bow::after {
            content: '';
            position: absolute;
            top: 0;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 5px solid #D4AF37;
        }

        .bow::before { left: -50px; transform: rotate(-20deg); }
        .bow::after { right: -50px; transform: rotate(20deg); }

        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0) rotate(-5deg); }
            20%, 80% { transform: translate3d(2px, 0, 0) rotate(5deg); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0) rotate(-5deg); }
            40%, 60% { transform: translate3d(4px, 0, 0) rotate(5deg); }
        }

        /* --- MESSAGE CARD --- */
        .message-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 2rem;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            transform: translateY(50px);
            opacity: 0;
            transition: all 0.8s ease;
            max-width: 500px;
            margin: 0 auto;
            border: 1px solid rgba(236, 0, 140, 0.2);
        }

        .message-card.visible {
            transform: translateY(0);
            opacity: 1;
        }

        .heart-icon {
            font-size: 3rem;
            color: #ec008c;
            animation: heartbeat 1.5s infinite;
        }

        @keyframes heartbeat {
            0% { transform: scale(1); }
            14% { transform: scale(1.3); }
            28% { transform: scale(1); }
            42% { transform: scale(1.3); }
            70% { transform: scale(1); }
        }

        /* --- CONFETTI --- */
        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            background-color: #f00;
            animation: fall linear forwards;
            z-index: 9999;
        }

        @keyframes fall {
            to { transform: translateY(100vh) rotate(720deg); }
        }
    </style>
</head>
<body class="relative flex flex-col items-center justify-center min-h-screen">

    <!-- Background Blobs -->
    <div class="bg-gradient"></div>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>

    <!-- Header -->
    <nav class="absolute top-0 w-full p-6 flex justify-between items-center z-10">
        <div class="flex items-center gap-2">
            <i class="fa-solid fa-crown text-pink-600 text-2xl"></i>
            <span class="font-bold text-xl text-gray-800 tracking-wider">Celebrate Her</span>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="text-center px-4 z-10 w-full max-w-4xl">
        
        <!-- Step 1: Selection -->
        <div id="selection-screen">
            <h1 class="text-5xl md:text-7xl font-bold text-gray-900 mb-6 serif">
                Happy <span class="text-transparent bg-clip-text bg-gradient-to-r from-pink-600 to-red-500">Women's</span> Day
            </h1>
            <p class="text-xl text-gray-600 mb-12 max-w-2xl mx-auto">
                Select the special woman in your life to reveal a personalized gift.
            </p>

            <div class="grid md:grid-cols-3 gap-6">
                <!-- Mom -->
                <div class="recipient-card bg-white p-8 rounded-3xl shadow-lg border border-pink-100" onclick="selectRecipient('mom')">
                    <div class="w-20 h-20 bg-pink-100 rounded-full flex items-center justify-center mx-auto mb-4">
                        <i class="fa-solid fa-venus text-3xl text-pink-600"></i>
                    </div>
                    <h3 class="text-2xl font-bold text-gray-800 mb-2">For Mom</h3>
                    <p class="text-gray-500 text-sm">The heart of the home</p>
                </div>

                <!-- Sister -->
                <div class="recipient-card bg-white p-8 rounded-3xl shadow-lg border border-purple-100" onclick="selectRecipient('sister')">
                    <div class="w-20 h-20 bg-purple-100 rounded-full flex items-center justify-center mx-auto mb-4">
                        <i class="fa-solid fa-female text-3xl text-purple-600"></i>
                    </div>
                    <h3 class="text-2xl font-bold text-gray-800 mb-2">For Sister</h3>
                    <p class="text-gray-500 text-sm">Forever my best friend</p>
                </div>

                <!-- Girlfriend -->
                <div class="recipient-card bg-white p-8 rounded-3xl shadow-lg border border-rose-100" onclick="selectRecipient('girlfriend')">
                    <div class="w-20 h-20 bg-rose-100 rounded-full flex items-center justify-center mx-auto mb-4">
                        <i class="fa-solid fa-heart text-3xl text-rose-600"></i>
                    </div>
                    <h3 class="text-2xl font-bold text-gray-800 mb-2">For Her</h3>
                    <p class="text-gray-500 text-sm">My queen, my love</p>
                </div>
            </div>
        </div>
        <br>
        <br>
        <!-- Step 2: Gift Box (Hidden Initially) -->
        <div id="gift-screen" class="hidden flex-col items-center">
            <div class="scene" id="giftScene">
                <div class="gift-box" id="giftBox">
                    <div class="bow"></div>
                    <div class="face front"><div class="ribbon-vertical"></div><div class="ribbon-horizontal"></div></div>
                    <div class="face back"><div class="ribbon-vertical"></div><div class="ribbon-horizontal"></div></div>
                    <div class="face right"><div class="ribbon-vertical"></div><div class="ribbon-horizontal"></div></div>
                    <div class="face left"><div class="ribbon-vertical"></div><div class="ribbon-horizontal"></div></div>
                    <div class="face top"><div class="ribbon-vertical"></div><div class="ribbon-horizontal"></div></div>
                    <div class="face bottom"></div>
                </div>
            </div>

            <!-- Message Card (Hidden Initially) -->
            <div id="messageCard" class="message-card">
                <div class="heart-icon mb-4">
                    <i class="fa-solid fa-heart"></i>
                </div>
                <h3 id="recipientTitle" class="text-3xl font-bold text-gray-900 mb-4 serif">Happy Women's Day!</h3>
                <p id="recipientMessage" class="text-gray-600 text-lg leading-relaxed mb-6">
                    Your message will appear here...
                </p>
                <button onclick="resetGift()" class="mt-4 px-6 py-2 bg-pink-600 text-white rounded-full font-medium hover:bg-pink-700 transition">
                    Choose Another
                </button>
            </div>
        </div>

    </main>
<br><br><br>
    <!-- Footer -->
    <footer class="absolute bottom-4 text-gray-400 text-sm">
        <p>Made with <i class="fa-solid fa-heart text-pink-500"></i> for you</p>
    </footer>

    <!-- Scripts -->
    <script>
        // --- 1. Message Data ---
        const messages = {
            mom: {
                title: "To My Dearest Mom",
                text: "Mom, you are the reason I am who I am today.Your love, sacrifices, and strength inspire me every day.Happy Women’s Day ❤️"
            },
            sister: {
                title: "To My Amazing Sister",
                text: "From childhood memories to life's journey, you've been my constant support. Thank you for being my partner and my best friend."
            },
            girlfriend: {
                title: "To My Beautiful Queen",
                text: "You make every day brighter with your smile and kindness. I am so lucky to have you in my life. Happy Women's Day, my love."
            }
        };

   // --- 2. Select Recipient Function ---
function selectRecipient(person) {
    const selectionScreen = document.getElementById('selection-screen');
    const giftScreen = document.getElementById('gift-screen');
    
    if(selectionScreen) selectionScreen.classList.add('hidden');
    if(giftScreen) {
        giftScreen.classList.remove('hidden');
        giftScreen.classList.add('flex');
    }
    
    const giftBox = document.getElementById('giftBox');
    if(giftBox) {
        giftBox.classList.remove('open');
        giftBox.classList.add('shake');
    }
    
    triggerConfetti();
    
    const data = messages[person];
    const titleEl = document.getElementById('recipientTitle');
    const msgEl = document.getElementById('recipientMessage');
    
    if(titleEl) titleEl.innerText = data.title;
    if(msgEl) msgEl.innerText = data.text;  // <-- Fixed: Added '=' operator

    // Show Message Card after box opens
    setTimeout(() => {
        if(giftBox) giftBox.classList.remove('shake');
        if(giftBox) giftBox.classList.add('open');
        
        const messageCard = document.getElementById('messageCard');
        if(messageCard) {
            messageCard.classList.add('visible');
        }
    }, 500);
}

    // Show Message Card after box opens
    setTimeout(() => {
        if(giftBox) giftBox.classList.remove('shake');
        if(giftBox) giftBox.classList.add('open');

        const messageCard = document.getElementById('messageCard');
        if(messageCard) {
            messageCard.classList.add('visible');
        }
    }, 500);

    // --- 3. Reset Gift Function ---
    function resetGift() {
        const selectionScreen = document.getElementById('selection-screen');
        const giftScreen = document.getElementById('gift-screen');
        const messageCard = document.getElementById('messageCard');
        const giftBox = document.getElementById('giftBox');

        if(selectionScreen) selectionScreen.classList.remove('hidden');
        if(giftScreen) {
            giftScreen.classList.add('hidden');
            giftScreen.classList.remove('flex');
        }
        if(messageCard) messageCard.classList.remove('visible');
        if(giftBox) {
            giftBox.classList.remove('open');
            giftBox.classList.add('shake');
            setTimeout(() => giftBox.classList.remove('shake'), 500);
        }
    }

    // --- 4. Confetti Effect ---
    function triggerConfetti() {
        const colors = ['#ec008c', '#fc6767', '#ffcd3c', '#ffffff', '#8e44ad'];

        for (let i = 0; i < 50; i++) {
            const confetti = document.createElement('div');
            confetti.classList.add('confetti');
            confetti.style.left = Math.random() * 100 + 'vw';
            confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            confetti.style.animationDuration = (Math.random() * 2 + 2) + 's';
            document.body.appendChild(confetti);

            // Remove confetti after animation
            setTimeout(() => {
                confetti.remove();
            }, 4000);
        }
    }
</script>
</body>
</html>
